experiment:
  name: SAGE_SAM_R4_3Class
  output_dir: outputs/SAGE_SAM_R4_3Class
  seed: 2026
  deterministic: false

data:
  root: ./KnowSAM/SampleData/260513_data_multiclass
  dataset_name: 260513_data_multiclass
  num_classes: 3
  image_size: 256
  in_channels: 3
  labeled_subdir: labeled
  unlabeled_subdir: unlabeled
  val_subdir: val
  test_subdir: test
  image_dir_name: image
  mask_dir_name: mask
  calibration_ratio: 0.15
  calibration_min_images: 4
  calibration_split_seed: 2026
  ignore_index: 255
  synthetic: false

train:
  device: cuda
  max_iterations: 10000
  batch_size_labeled: 8
  batch_size_unlabeled: 8
  num_workers: 4
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adamw
  amp: true
  grad_clip_norm: 5.0
  log_every: 20
  val_every: 250
  save_every: 500
  warmup_iterations: 1200
  unsup_ramp_iterations: 1200
  gradient_accumulation: 1

model:
  deploy_backbone: knowsam_unet
  base_channels: 32
  use_boundary_head: true
  feature_dim: 256
  complementary_dropout_p: 0.2

teacher:
  fast_ema_decay: 0.99
  slow_ema_decay: 0.999
  slow_refresh_every: 500
  slow_refresh_min_delta: 0.0005
  slow_min_dwell: 1000
  use_bn_eval_for_teacher: true

sam:
  use_sam: true
  model_type: vit_b
  checkpoint: ./KnowSAM/sam_vit_b_01ec64.pth
  device: cuda
  image_size: 1024
  cache_dir: ./cache/SAGE_SAM_R4/sam_structure
  cache_embeddings: true
  cache_affinity: true
  topk_edges: 8
  train_peft: true
  peft_type: lora
  lora_rank: 4
  lora_alpha: 8
  train_mask_decoder: true
  train_prompt_generator: true
  peft_warmup_iterations: 1200
  max_components_per_class: 3
  min_component_area: 16
  semantic_kd_max_weight: 0.15
  structure_kd_weight: 0.05
  boundary_kd_weight: 0.05
  utility_temperature: 0.02
  utility_ema_decay: 0.9
  disable_semantic_kd_after_no_gain: 3

conformal:
  alpha: 0.1
  min_pixels_per_class: 128
  classwise: true
  shrink_to_global: true
  background_alpha: 0.05
  update_every: 500

pseudo:
  singleton_weight: 1.0
  set_weight: 0.5
  rank_weight: 0.1
  negative_weight: 0.1
  relation_weight: 0.05
  boundary_weight: 0.05
  rank_margin: 0.5
  safe_negative_threshold: 0.05
  max_candidate_set_size: 2
  min_teacher_confidence: 0.5
  min_sam_confidence: 0.5

augmentation:
  weak:
    random_flip: true
    random_rotate_degree: 10
    random_resized_crop: false
  strong:
    random_flip: true
    random_rotate_degree: 15
    gamma_range: [0.7, 1.5]
    gain_range: [0.75, 1.25]
    speckle_std_range: [0.0, 0.12]
    gaussian_blur_prob: 0.3
    cutmix_prob: 0.5
    patch_mask_prob: 0.3
    patch_mask_ratio: 0.25
    adaptive_strength: true

eval:
  batch_size: 1
  save_prediction: true
  compute_hd95: true
  exclude_background_for_avg: true
